services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: always
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_RUNNERS_ENABLED=true
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Europe/Paris
      - TZ=Europe/Paris
    volumes:
      - n8n_data:/home/node/.n8n
      - ./local-files:/files

  discord-bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID:-}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID:-}
    depends_on:
      - n8n
    networks:
      - default
    # Optional: Add volume for logs
    volumes:
      - discord_bot_logs:/app/logs

  mongodb:
    image: mongodb/mongodb-community-server:6.0-ubi8
    environment:
      - MONGODB_INITDB_ROOT_USERNAME=user
      - MONGODB_INITDB_ROOT_PASSWORD=pass
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongodb_data:/data/db

  # Content Creation MCP Server
  mcp-content-creation:
    build:
      context: .
      dockerfile: docker/mcp-content.Dockerfile
    container_name: mcp-content-creation
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    ports:
      - "127.0.0.1:8011:8011"
    volumes:
      - ./:/app:ro
      - ./outputs/mcp-content:/output  # Bind mount to local outputs directory
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8011
      - MCP_OUTPUT_DIR=/output
    networks:
      - default
    command: ["python", "-m", "mcp_content_creation.server", "--mode", "http"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # EEG Dataset MCP Server
  mcp-eeg-dataset:
    build:
      context: .
      dockerfile: docker/mcp-eeg-dataset.Dockerfile
    container_name: mcp-eeg-dataset
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    ports:
      - "127.0.0.1:8012:8012"
    volumes:
      - ./:/app:ro
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8012
    networks:
      - default
    command: ["python", "-m", "mcp_eeg_dataset.server", "--mode", "http"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Web Scraper MCP Server
  mcp-web-scraper:
    build:
      context: .
      dockerfile: docker/mcp-web-scraper.Dockerfile
    container_name: mcp-web-scraper
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    ports:
      - "127.0.0.1:8013:8013"
    volumes:
      - ./:/app:ro
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8013
    networks:
      - default
    command: ["python", "-m", "mcp_web_scraper.server", "--mode", "http"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8013/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

